aviary_rise_node:
  ros__parameters:
    control_frequency: 50.0
    controller_type: noresnet
    d_in: 15
    d_out: 3
    desired_trajectory: 1
    h_act_func: swish
    hover_start_z: -0.75 # NED
    initial_weight_scale_factor: 0.1
    init_tol: 0.2
    init_x: 2.0 # 0.70 # NED
    init_y: -3.0 #-2.37 # NED
    init_z: -0.5 # NED
    k_1: 0.125
    k_2: 0.9
    k_3: 1.3
    k_rise: 2.0
    o_act_func: tanh
    q_e: 1.0
    r_u: 0.2
    safe_x_max: 5.0
    safe_y_max: 11.5
    safe_z_max: 0.5
    safe_z_min: -6.5
    save_data: false
    shortcut_act_func: swish
    sim_time: 10.0
    theta_bar: 1000000.0
    traj1_alpha_warp: 0.5
    traj1_center_z: -0.75
    traj1_period: 30.0
    traj1_x_amp: 1.5
    traj1_y_amp: 3.0
    traj1_z_amp: 0.25
    traj2_center_z: -0.5
    traj2_petal_radius: 2.5
    traj2_target_speed: 1.0
    w_fail: 1000.0
    xy_rand_range: 1.0    # +/- meters variation for takeoff X and Y
    z_rand_range: 0.25    # +/- meters variation for hover_start_z
    mpc_acc_hor_max: 6.0
    mpc_acc_vert_max: 3.0
    num_eval_seeds: 3 # For mini-batches in the optimization
    base_seed: 42
    
    # Dynamic paths configuration to avoid hardcoding in Python scripts:
    db_path: "sqlite:///output/optimization.db"
    robustness_output_path: "output/robustness_results.csv"
    best_gains_path: "conf/best_gains.yaml"
