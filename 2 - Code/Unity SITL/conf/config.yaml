aviary_rise_node:
  ros__parameters:
    control_frequency_hz: 50.0
    controller_type: noresnet
    d_in: 15
    d_out: 3
    desired_trajectory: 1
    h_act_func: swish
    hover_start_z_m_ned: -0.75
    initial_weight_scale_factor: 0.1
    init_tol_m: 0.0 #0.2
    init_x_m_ned: 2.0 # 0.70
    init_y_m_ned: -1.0 #-2.37
    init_z_m_ned: -0.5
    init_yaw_deg: 90.0
    yaw_des_deg: 0.0
    k_1: 0.72
    k_2: 0.11
    k_3: 2.4
    k_rise: 0.5
    K_P_yaw: 0.35
    o_act_func: tanh
    q_e: 1.0
    r_u: 0.2
    safe_x_min_m_ned: -5.0
    safe_x_max_m_ned: 5.0
    safe_y_min_m_ned: -11.5
    safe_y_max_m_ned: 11.5
    safe_z_max_m_ned: 0.5
    safe_z_min_m_ned: -6.5
    save_data: false
    shortcut_act_func: swish
    sim_time_s: 5.0
    theta_bar: 1000000.0
    traj1_alpha_warp: 0.5
    traj1_center_z_m_ned: -0.75
    traj1_period_s: 30.0
    traj1_x_amp_m_ned: 1.5
    traj1_y_amp_m_ned: 3.0
    traj1_z_amp_m_ned: 0.25
    traj2_center_z_m_ned: -0.5
    traj2_petal_radius_m: 2.5
    traj2_target_speed_mps: 1.0
    w_fail: 1000.0
    xy_rand_range_m: 1.0    # +/- meters variation for takeoff X and Y
    z_rand_range_m: 0.25    # +/- meters variation for hover_start_z
    mpc_acc_hor_max_mps2: 6.0
    mpc_acc_vert_max_mps2: 3.0
    num_eval_seeds: 3 # For mini-batches in run_optimization.py
    base_seed: 42
    db_path: "sqlite:///output/optimization.db"
    robustness_output_path: "output/robustness_results.csv"
    best_gains_path: "conf/best_gains.yaml"
